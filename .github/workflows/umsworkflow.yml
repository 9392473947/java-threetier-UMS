name: Secure CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

# ===============================
# 1️⃣ SAST - SEMGREP
# ===============================
  semgrep-scan:
    name: SAST Scan (Semgrep)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/default"

# ===============================
# 2️⃣ SCA - SNYK
# ===============================
  snyk-scan:
    name: SCA Scan (Snyk)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Snyk
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Test
        run: snyk test --all-projects || true

# ===============================
# 3️⃣ IaC SCAN - TRIVY
# ===============================
  trivy-iac:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy IaC Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: table
          exit-code: 0

# ===============================
# 4️⃣ BUILD BACKEND IMAGE
# ===============================
  build-backend:
    name: Build Backend
    needs: [semgrep-scan, snyk-scan, trivy-iac]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: docker build -t reddychaithanya06/local-ums-backend-git:latest ./ums-backend

      - name: Push backend image
        run: docker push reddychaithanya06/local-ums-backend-git:latest

# ===============================
# 5️⃣ BUILD FRONTEND IMAGE
# ===============================
  build-frontend:
    name: Build Frontend
    needs: [semgrep-scan, snyk-scan, trivy-iac]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build frontend image
        run: docker build -t reddychaithanya06/local-ums-frontend-git:latest ./ums-frontend

      - name: Push frontend image
        run: docker push reddychaithanya06/local-ums-frontend-git:latest

# ===============================
# 6️⃣ TRIVY CONTAINER SCAN
# ===============================
  trivy-image:
    name: Trivy Container Scan
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Scan Backend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: reddychaithanya06/local-ums-backend-git:latest
          format: table
          exit-code: 0

      - name: Scan Frontend Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: reddychaithanya06/local-ums-frontend-git:latest
          format: table
          exit-code: 0
 
