name: Secure CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

# ===============================
# 1️⃣ SAST - SEMGREP
# ===============================
  semgrep-scan:
    name: SAST Scan (Semgrep)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep and Generate SARIF
        run: |
          docker run --rm -v "$(pwd):/src" returntocorp/semgrep \
            semgrep --config p/default --sarif --output semgrep-report.sarif

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-report
          path: semgrep-report.sarif

# ===============================
# 2️⃣ SCA - SNYK
# ===============================
  snyk-scan:
    name: SCA Scan (Snyk)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Snyk
        run: npm install -g snyk

      - name: Authenticate Snyk
        run: snyk auth ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk and Generate JSON
        run: snyk test --all-projects --json > snyk-report.json || true

      - name: Upload Snyk Report
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: snyk-report.json

# ===============================
# 3️⃣ IaC SCAN - TRIVY
# ===============================
  trivy-iac:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy IaC JSON Report
        run: |
          docker run --rm -v "$(pwd):/src" aquasec/trivy config \
            --format json -o trivy-iac-report.json /src

      - name: Upload Trivy IaC Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-iac-report
          path: trivy-iac-report.json

# ===============================
# 4️⃣ BUILD BACKEND IMAGE
# ===============================
  build-backend:
    name: Build Backend
    needs: [semgrep-scan, snyk-scan, trivy-iac]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: docker build -t reddychaithanya06/local-ums-backend-git:latest ./ums-backend

      - name: Push backend image
        run: docker push reddychaithanya06/local-ums-backend-git:latest

# ===============================
# 5️⃣ BUILD FRONTEND IMAGE
# ===============================
  build-frontend:
    name: Build Frontend
    needs: [semgrep-scan, snyk-scan, trivy-iac]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build frontend image
        run: docker build -t reddychaithanya06/local-ums-frontend-git:latest ./ums-frontend

      - name: Push frontend image
        run: docker push reddychaithanya06/local-ums-frontend-git:latest

# ===============================
# 6️⃣ TRIVY CONTAINER SCAN
# ===============================
  trivy-image:
    name: Trivy Container Scan
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: Scan Backend Image
        run: |
          docker run --rm aquasec/trivy image \
            --format json -o trivy-backend-report.json \
            reddychaithanya06/local-ums-backend-git:latest

      - name: Scan Frontend Image
        run: |
          docker run --rm aquasec/trivy image \
            --format json -o trivy-frontend-report.json \
            reddychaithanya06/local-ums-frontend-git:latest

      - name: Upload Trivy Image Reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-reports
          path: |
            trivy-backend-report.json
            trivy-frontend-report.json
 
